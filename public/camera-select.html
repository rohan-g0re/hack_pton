<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Up Nanny Cam — Caretaker Command Center</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <a class="back-link" href="/">← Back to home</a>

      <header class="page-title-block">
        <h1>Set Up Nanny Cam</h1>
        <p class="muted">Choose which area this device monitors.</p>
      </header>

      <div class="role-grid">
        <a class="role-card" href="/bind?role=pantry">
          <span class="role-card-icon" aria-hidden="true">▣</span>
          <h2>Nanny Pantry Cam</h2>
          <p>Place in front of the pantry shelves.</p>
          <span class="button role-card-cta">Start Pantry →</span>
        </a>
        <a class="role-card" href="/bind?role=medicine">
          <span class="role-card-icon" aria-hidden="true">✚</span>
          <h2>Nanny Medicine Cam</h2>
          <p>Point at the medicine table where pills are.</p>
          <span class="button role-card-cta">Start Medicine →</span>
        </a>
      </div>
    </div>
  </body>
</html>
