<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Caretaker Command Center</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell narrow">
      <a class="back-link" href="/">← Back to home</a>

      <header class="page-title-block">
        <h1>Register as Caretaker</h1>
        <p class="muted">Set up your household to begin monitoring your patient.</p>
      </header>

      <section class="panel">
        <div class="panel-heading">
          <h2>Caretaker details</h2>
        </div>
        <form id="register-form" class="stack gap-md">
          <label>
            Your name
            <input name="caretakerName" type="text" autocomplete="name" required />
          </label>
          <label>
            Your phone number
            <input name="phone" type="tel" autocomplete="tel" required />
          </label>
          <p class="form-hint">Used for iMessage medication alerts (Photon).</p>
          <label>
            Patient name
            <input name="patientName" type="text" required />
          </label>
          <label>
            Relationship
            <select name="relationship" required>
              <option value="Grandmother">Grandmother</option>
              <option value="Grandfather">Grandfather</option>
              <option value="Parent">Parent</option>
              <option value="Spouse">Spouse</option>
              <option value="Other">Other</option>
            </select>
          </label>
          <button class="button" type="submit">Continue to Dashboard →</button>
        </form>
      </section>
    </div>

    <script type="module" src="/register.js"></script>
  </body>
</html>
